<html lang="zh-TW">
<head>

<title>Phinn-Phang 後台管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,400;1,300&display=swap" rel="stylesheet">
<style>

body{background:#131110;color:#E8E0D6;font-family:'Noto Serif TC',serif;font-weight:300;font-size:14px;line-height:1.7;min-height:100vh}

input:focus,select:focus,textarea:focus{border-color:rgba(200,150,90,0.6)}

.tag{display:inline-block;padding:2px 8px;border:1px solid;font-size:11px;letter-spacing:.05em}
label{display:block;font-size:11px;letter-spacing:.12em;color:rgba(200,150,90,0.7);margin-bottom:5px}
.field{margin-bottom:18px}
h2{font-size:18px;font-weight:400;letter-spacing:.12em;color:#F0E8DE;margin-bottom:4px}
h3{font-size:14px;font-weight:400;letter-spacing:.1em;color:rgba(200,150,90,0.8);margin-bottom:12px}
.card{background:#1A1612;border:1px solid rgba(200,150,90,0.15);padding:20px}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="app-data.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Login ──────────────────────────────────────────────────────────────────
function Login({ onLogin }) {
  const [pw, setPw] = useState('');
  const [err, setErr] = useState('');
  const submit = (e) => {
    e.preventDefault();
    const s = PP.getSettings();
    if (pw === s.adminPassword) onLogin();
    else setErr('密碼錯誤，請再試一次');
  };
  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'radial-gradient(ellipse at 50% 40%, #2A1A0E 0%, #131110 70%)'}}>
      <div style={{width:340,padding:'40px 36px',background:'#1A1612',border:'1px solid rgba(200,150,90,0.2)'}}>
        <div style={{textAlign:'center',marginBottom:32}}>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:13,fontStyle:'italic',letterSpacing:'.3em',color:'rgba(200,150,90,0.7)',marginBottom:8}}>Phinn-Phang</div>
          <h2 style={{fontSize:16,letterSpacing:'.2em'}}>後台管理</h2>
        </div>
        <form onSubmit={submit}>
          <div className="field">
            <label>管理員密碼</label>
            <input type="password" value={pw} onChange={e=>setPw(e.target.value)} autoFocus />
          </div>
          {err && <div style={{color:'#C86050',fontSize:12,marginBottom:12}}>{err}</div>}
          <button type="submit" className="btn btn-primary" style={{width:'100%',padding:'11px'}}>登入</button>
        </form>
      </div>
    </div>
  );
}

// ── Ingredient Editor ──────────────────────────────────────────────────────
function IngredientRow({ ing, onChange, onDelete }) {
  return (
    <div style={{display:'grid',gridTemplateColumns:'110px 1fr 1fr 130px 36px',gap:6,marginBottom:6,alignItems:'center'}}>
      <select value={ing.layer} onChange={e=>onChange({...ing,layer:e.target.value})}>
        <option value="top">前調</option>
        <option value="middle">中調</option>
        <option value="base">後調</option>
      </select>
      <input placeholder="中文名稱" value={ing.name} onChange={e=>onChange({...ing,name:e.target.value})} />
      <input placeholder="English" value={ing.nameEn} onChange={e=>onChange({...ing,nameEn:e.target.value})} />
      <select value={ing.family} onChange={e=>onChange({...ing,family:e.target.value})}>
        {PP.FAMILIES.map(f=><option key={f.id} value={f.id}>{f.zh}</option>)}
      </select>
      <button className="btn btn-danger" style={{padding:'8px 0',fontSize:14}} onClick={onDelete}>✕</button>
    </div>
  );
}

// ── CSV Import Modal ───────────────────────────────────────────────────────
function CsvImportModal({ onClose, onImport }) {
  const [raw, setRaw] = useState('');
  const [preview, setPreview] = useState(null);
  const [error, setError] = useState('');

  // Parse CSV → ingredient rows. Expected headers (case-insensitive, bilingual):
  // 調性/T/M/L | 中文名稱 | 英文名稱/English | 香調/Family | (其他欄位忽略)
  const LAYER_MAP = { T:'top', M:'middle', L:'base', 'top':'top','middle':'middle','base':'base','前調':'top','中調':'middle','後調':'base' };
  const FAMILY_MAP = {
    'citrus':'citrus','floral':'floral','fruity':'fresh','green':'fresh','tea':'fresh','aldehyde':'fresh','fresh':'fresh',
    'woody':'woody','mossy':'woody','spicy':'spicy','sweety':'gourmand','gourmand':'gourmand','balsam':'oriental','musk':'oriental','animal':'oriental','oriental':'oriental',
    '柑橘':'citrus','花香':'floral','果香':'fresh','綠葉':'fresh','茶香':'fresh','木質':'woody','苔蘚':'woody','辛香':'spicy','甜美':'gourmand','美食':'gourmand','香脂':'oriental','動物':'oriental','麝香':'oriental','東方':'oriental','清新':'fresh'
  };

  const parseCSV = (text) => {
    // Simple CSV parser handling quoted fields
    const rows = [];
    let row = [], cur = '', inQ = false;
    for (let i=0;i<text.length;i++){
      const ch = text[i];
      if (inQ){
        if (ch === '"' && text[i+1] === '"'){ cur += '"'; i++; }
        else if (ch === '"'){ inQ = false; }
        else cur += ch;
      } else {
        if (ch === '"') inQ = true;
        else if (ch === ','){ row.push(cur); cur = ''; }
        else if (ch === '\n'){ row.push(cur); rows.push(row); row=[]; cur=''; }
        else if (ch === '\r'){ /* skip */ }
        else cur += ch;
      }
    }
    if (cur.length || row.length) { row.push(cur); rows.push(row); }
    return rows.filter(r => r.some(c => c && c.trim()));
  };

  const process = () => {
    setError('');
    if (!raw.trim()){ setError('請貼上 CSV 內容'); return; }
    const rows = parseCSV(raw);
    if (rows.length < 2){ setError('內容太少，至少需要表頭與一列資料'); return; }
    const header = rows[0].map(h => h.trim().toLowerCase());
    // Find columns
    const findCol = (names) => header.findIndex(h => names.some(n => h === n.toLowerCase() || h.includes(n.toLowerCase())));
    const layerIdx = findCol(['調性','layer','tml','音符']);
    const nameIdx  = findCol(['中文名稱','中文','名稱','name (zh)','chinese']);
    const enIdx    = findCol(['英文名稱','english','name','en']);
    const famIdx   = findCol(['香調','family','scent']);
    if (nameIdx < 0 && enIdx < 0){ setError('找不到「中文名稱」或「英文名稱」欄位'); return; }

    const out = [];
    for (let i=1;i<rows.length;i++){
      const r = rows[i];
      const zh = (nameIdx >= 0 ? r[nameIdx] : '').trim();
      const en = (enIdx >= 0 ? r[enIdx] : '').trim();
      if (!zh && !en) continue;
      const layerRaw = (layerIdx >= 0 ? r[layerIdx] : '').trim().toUpperCase();
      const layer = LAYER_MAP[layerRaw] || LAYER_MAP[layerRaw.toLowerCase()] || 'middle';
      const famRaw = (famIdx >= 0 ? r[famIdx] : '').trim();
      // Take first family if multi-value e.g. "Citrus, Fruity"
      const famFirst = famRaw.split(/[,、\/]/)[0].trim().toLowerCase();
      const family = FAMILY_MAP[famFirst] || 'floral';
      out.push({ id: PP.genId(), name: zh, nameEn: en, family, layer });
    }
    if (out.length === 0){ setError('沒有可匯入的資料'); return; }
    setPreview(out);
  };

  const bg = 'rgba(10,8,6,0.92)';
  return (
    <div style={{position:'fixed',inset:0,background:bg,zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{background:'#14110D',border:'1px solid rgba(200,150,90,0.25)',maxWidth:720,width:'100%',maxHeight:'90vh',overflow:'auto',padding:28}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <h3 style={{margin:0}}>匯入 CSV</h3>
          <button className="btn" onClick={onClose} style={{padding:'6px 12px'}}>關閉</button>
        </div>
        {!preview && (
          <>
            <div style={{fontSize:12,color:'rgba(245,239,230,0.5)',lineHeight:1.7,marginBottom:12}}>
              支援欄位：<span style={{color:'rgba(200,150,90,0.9)'}}>調性 (T/M/L)、中文名稱、英文名稱、香調</span><br/>
              從 Google Sheets 複製儲存格後直接貼上即可；系統會自動對應欄位與香調分類。
            </div>
            <textarea rows={12} value={raw} onChange={e=>setRaw(e.target.value)} placeholder="貼上 CSV 內容（含表頭）..." style={{width:'100%',fontFamily:'monospace',fontSize:12}} />
            {error && <div style={{color:'#D97757',fontSize:12,marginTop:8}}>{error}</div>}
            <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:12}}>
              <button className="btn btn-primary" onClick={process}>解析預覽</button>
            </div>
          </>
        )}
        {preview && (
          <>
            <div style={{fontSize:12,color:'rgba(245,239,230,0.6)',marginBottom:10}}>
              將匯入 <span style={{color:'#D4A574'}}>{preview.length}</span> 種香精（附加至現有清單）
            </div>
            <div style={{maxHeight:360,overflow:'auto',border:'1px solid rgba(200,150,90,0.15)',padding:8,marginBottom:12}}>
              {preview.map((p,i)=>{
                const fam = PP.FAMILIES.find(f=>f.id===p.family);
                const layerZh = {top:'前調',middle:'中調',base:'後調'}[p.layer];
                return (
                  <div key={i} style={{display:'grid',gridTemplateColumns:'60px 1fr 1fr 90px',gap:8,fontSize:12,padding:'4px 6px',borderBottom:'1px solid rgba(200,150,90,0.08)'}}>
                    <span style={{color:'rgba(200,150,90,0.7)'}}>{layerZh}</span>
                    <span style={{color:'#F0E8DE'}}>{p.name || '—'}</span>
                    <span style={{color:'rgba(245,239,230,0.5)',fontStyle:'italic'}}>{p.nameEn || '—'}</span>
                    <span style={{color:'rgba(200,150,90,0.6)'}}>{fam?.zh || p.family}</span>
                  </div>
                );
              })}
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'space-between'}}>
              <button className="btn" onClick={()=>setPreview(null)}>返回編輯</button>
              <button className="btn btn-primary" onClick={()=>onImport(preview)}>確認匯入</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ── Course Editor ──────────────────────────────────────────────────────────
function CourseEditor({ course: init, onSave, onCancel, settings }) {
  const blank = { id: PP.genId(), name: '', type: settings.courseTypes[0]||'', token: PP.genToken(), ingredients: [], bases: [], hasBase: false, bookable: false, capacity: 6, slots: [] };
  const [c, setC] = useState(init || blank);
  const [newType, setNewType] = useState('');
  const [showImport, setShowImport] = useState(false);

  const addIng = () => setC(p=>({...p, ingredients:[...p.ingredients,{id:PP.genId(),name:'',nameEn:'',family:'citrus',layer:'top'}]}));
  const updateIng = (i,v) => setC(p=>({...p,ingredients:p.ingredients.map((x,j)=>j===i?v:x)}));
  const removeIng = (i) => setC(p=>({...p,ingredients:p.ingredients.filter((_,j)=>j!==i)}));

  const addBase = () => setC(p=>({...p,bases:[...p.bases,{id:PP.genId(),name:''}]}));
  const updateBase = (i,v) => setC(p=>({...p,bases:p.bases.map((x,j)=>j===i?{...x,name:v}:x)}));
  const removeBase = (i) => setC(p=>({...p,bases:p.bases.filter((_,j)=>j!==i)}));

  const formulaUrl = `${window.location.origin}${window.location.pathname.replace('admin.html','formula.html')}?token=${c.token}`;

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:28}}>
        <h2>{init?'編輯課程':'新增課程'}</h2>
        <div style={{display:'flex',gap:8}}>
          <button className="btn" onClick={onCancel}>取消</button>
          <button className="btn btn-primary" onClick={()=>onSave(c)}>儲存課程</button>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
        <div className="field">
          <label>課程名稱</label>
          <input value={c.name} onChange={e=>setC(p=>({...p,name:e.target.value}))} placeholder="例：春季體驗課 2026/04" />
        </div>
        <div className="field">
          <label>課程類型</label>
          <select value={c.type} onChange={e=>setC(p=>({...p,type:e.target.value}))}>
            {settings.courseTypes.map(t=><option key={t} value={t}>{t}</option>)}
          </select>
        </div>
        <div className="field" style={{gridColumn:'1/-1'}}>
          <label>學員連結（Token）</label>
          <div style={{display:'flex',gap:6}}>
            <input value={formulaUrl} readOnly style={{flex:1,fontSize:11,color:'rgba(200,150,90,0.7)'}} onClick={e=>e.target.select()} />
            <button className="btn" onClick={()=>{navigator.clipboard.writeText(formulaUrl)}} style={{whiteSpace:'nowrap',padding:'8px 12px'}}>複製</button>
          </div>
        </div>
      </div>

      {/* Bookable slots */}
      <div className="card" style={{marginBottom:16}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <h3>開放預約</h3>
          <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',marginBottom:0}}>
            <input type="checkbox" checked={c.bookable||false} onChange={e=>setC(p=>({...p,bookable:e.target.checked}))} style={{width:'auto'}} />
            <span style={{fontSize:12,color:'rgba(200,150,90,0.7)'}}>可供學員線上預約</span>
          </label>
        </div>
        {c.bookable && (
          <div>
            <div className="field" style={{maxWidth:200}}>
              <label>每時段人數上限</label>
              <input type="number" min="1" value={c.capacity||6} onChange={e=>setC(p=>({...p,capacity:Number(e.target.value)}))} />
            </div>
            <div style={{fontSize:11,color:'rgba(200,150,90,0.6)',marginBottom:8}}>可預約時段</div>
            {(c.slots||[]).map((s,i)=>(
              <div key={s.id} style={{display:'grid',gridTemplateColumns:'1fr 1fr 36px',gap:6,marginBottom:6}}>
                <input type="date" value={s.date} onChange={e=>setC(p=>({...p,slots:p.slots.map((x,j)=>j===i?{...x,date:e.target.value,id:e.target.value+x.time}:x)}))} />
                <input type="time" value={s.time} onChange={e=>setC(p=>({...p,slots:p.slots.map((x,j)=>j===i?{...x,time:e.target.value,id:x.date+e.target.value}:x)}))} />
                <button className="btn btn-danger" style={{padding:'8px 0'}} onClick={()=>setC(p=>({...p,slots:p.slots.filter((_,j)=>j!==i)}))}>✕</button>
              </div>
            ))}
            <button className="btn" onClick={()=>setC(p=>({...p,slots:[...(p.slots||[]),{id:PP.genId(),date:new Date().toISOString().slice(0,10),time:'14:00'}]}))} style={{padding:'5px 14px',fontSize:12}}>+ 新增時段</button>
          </div>
        )}
      </div>

      {/* Ingredients */}
      <div className="card" style={{marginBottom:16}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:8}}>
          <h3>香精清單（{c.ingredients.length} 種）</h3>
          <div style={{display:'flex',gap:6}}>
            <button className="btn" onClick={()=>setShowImport(true)} style={{padding:'5px 14px',fontSize:12}}>匯入 CSV</button>
            <button className="btn" onClick={addIng} style={{padding:'5px 14px',fontSize:12}}>+ 新增香精</button>
          </div>
        </div>
        {c.ingredients.length === 0 && <div style={{color:'rgba(245,239,230,0.3)',fontSize:12,fontStyle:'italic'}}>尚未新增香精</div>}
        {c.ingredients.length > 0 && (
          <div style={{fontFamily:'monospace',fontSize:11,color:'rgba(200,150,90,0.4)',display:'grid',gridTemplateColumns:'110px 1fr 1fr 130px 36px',gap:6,marginBottom:6}}>
            <span>音符位置</span><span>中文名稱</span><span>English</span><span>香調</span><span/>
          </div>
        )}
        {c.ingredients.map((ing,i)=>(
          <IngredientRow key={ing.id} ing={ing} onChange={v=>updateIng(i,v)} onDelete={()=>removeIng(i)} />
        ))}
      </div>
      {showImport && <CsvImportModal onClose={()=>setShowImport(false)} onImport={(rows)=>{setC(p=>({...p,ingredients:[...p.ingredients, ...rows]}));setShowImport(false);}} />}

      {/* Bases */}
      <div className="card" style={{marginBottom:16}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <h3>基底選項</h3>
          <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',marginBottom:0}}>
            <input type="checkbox" checked={c.hasBase} onChange={e=>setC(p=>({...p,hasBase:e.target.checked}))} style={{width:'auto'}} />
            <span style={{fontSize:12,color:'rgba(200,150,90,0.7)'}}>此課程有基底</span>
          </label>
        </div>
        {c.hasBase && (
          <div>
            {c.bases.map((b,i)=>(
              <div key={b.id} style={{display:'flex',gap:6,marginBottom:6}}>
                <input value={b.name} onChange={e=>updateBase(i,e.target.value)} placeholder="基底名稱（例：乳霜基底 / 酒精香水）" />
                <button className="btn btn-danger" style={{padding:'8px 14px'}} onClick={()=>removeBase(i)}>✕</button>
              </div>
            ))}
            <button className="btn" onClick={addBase} style={{padding:'5px 14px',fontSize:12}}>+ 新增基底</button>
          </div>
        )}
        {!c.hasBase && <div style={{color:'rgba(245,239,230,0.3)',fontSize:12,fontStyle:'italic'}}>未啟用</div>}
      </div>

    </div>
  );
}

// ── Course List ────────────────────────────────────────────────────────────
function CourseList({ courses, onCreate, onEdit, onCopy, onDelete, works }) {
  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
        <h2>課程管理</h2>
        <button className="btn btn-primary" onClick={onCreate}>+ 新增課程</button>
      </div>
      {courses.length===0 && <div style={{color:'rgba(245,239,230,0.3)',textAlign:'center',padding:60,border:'1px dashed rgba(200,150,90,0.15)'}}>尚未建立任何課程。點擊「新增課程」開始。</div>}
      {courses.map(c => {
        const wCount = works.filter(w=>w.courseId===c.id).length;
        const url = `${window.location.origin}${window.location.pathname.replace('admin.html','formula.html')}?token=${c.token}`;
        return (
          <div key={c.id} className="card" style={{marginBottom:10,display:'grid',gridTemplateColumns:'1fr auto',gap:16,alignItems:'start'}}>
            <div>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
                <span style={{fontSize:16,color:'#F0E8DE',letterSpacing:'.08em'}}>{c.name||'（未命名課程）'}</span>
                <span className="tag" style={{borderColor:'rgba(200,150,90,0.3)',color:'rgba(200,150,90,0.7)'}}>{c.type}</span>
                <span className="tag" style={{borderColor:'rgba(245,239,230,0.15)',color:'rgba(245,239,230,0.4)'}}>{c.ingredients.length} 種香精</span>
                {c.hasBase && <span className="tag" style={{borderColor:'rgba(123,158,110,0.3)',color:'rgba(123,158,110,0.7)'}}>含基底</span>}
              </div>
              <div style={{fontSize:12,color:'rgba(245,239,230,0.35)',marginBottom:8}}>{c.date} · {wCount} 件作品</div>
              <div style={{fontSize:11,color:'rgba(200,150,90,0.4)',fontFamily:'monospace',wordBreak:'break-all'}}>{url}</div>
            </div>
            <div style={{display:'flex',gap:6,flexShrink:0}}>
              <button className="btn" style={{padding:'6px 12px',fontSize:12}} onClick={()=>onEdit(c)}>編輯</button>
              <button className="btn" style={{padding:'6px 12px',fontSize:12}} onClick={()=>onCopy(c)}>複製</button>
              <button className="btn btn-danger" style={{padding:'6px 12px',fontSize:12}} onClick={()=>onDelete(c.id)}>刪除</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── Reservations View (calendar) ─────────────────────────────────────────
function ReservationsView() {
  const [reservations, setReservations] = useState(PP.getReservations());
  const [ym, setYm] = useState(() => { const d=new Date(); return {y:d.getFullYear(),m:d.getMonth()}; });
  const [selected, setSelected] = useState(null);

  const refresh = () => setReservations(PP.getReservations());

  const first = new Date(ym.y, ym.m, 1);
  const startWeekday = first.getDay();
  const daysInMonth = new Date(ym.y, ym.m+1, 0).getDate();
  const cells = [];
  for (let i=0;i<startWeekday;i++) cells.push(null);
  for (let d=1;d<=daysInMonth;d++) cells.push(d);

  const byDate = {};
  reservations.forEach(r => {
    if (r.status === 'cancelled') return;
    if (!byDate[r.date]) byDate[r.date] = [];
    byDate[r.date].push(r);
  });

  const dateStr = (d) => `${ym.y}-${String(ym.m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const dayRes = selected ? (byDate[selected]||[]) : [];

  const updateStatus = (r, status) => { PP.saveReservation({...r, status}); refresh(); };
  const deleteRes = (id) => { if(confirm('確定刪除此預約？')){PP.deleteReservation(id);setSelected(null);refresh();} };

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
        <h2>預約管理</h2>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          <button className="btn" onClick={()=>setYm(p=>({y:p.m===0?p.y-1:p.y,m:p.m===0?11:p.m-1}))}>‹</button>
          <div style={{minWidth:120,textAlign:'center',fontSize:14,letterSpacing:'.1em',color:'#F0E8DE'}}>{ym.y} 年 {ym.m+1} 月</div>
          <button className="btn" onClick={()=>setYm(p=>({y:p.m===11?p.y+1:p.y,m:p.m===11?0:p.m+1}))}>›</button>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:1,background:'rgba(200,150,90,0.1)',border:'1px solid rgba(200,150,90,0.15)',marginBottom:24}}>
        {['日','一','二','三','四','五','六'].map(w=>(
          <div key={w} style={{padding:'8px 0',textAlign:'center',background:'#1E1A16',fontSize:11,letterSpacing:'.2em',color:'rgba(200,150,90,0.6)'}}>{w}</div>
        ))}
        {cells.map((d,i)=>{
          if(!d) return <div key={i} style={{background:'#16100E',minHeight:88}} />;
          const ds = dateStr(d);
          const items = byDate[ds]||[];
          const totalPeople = items.reduce((s,r)=>s+Number(r.people||0),0);
          const isSel = selected === ds;
          const isToday = ds === new Date().toISOString().slice(0,10);
          return (
            <div key={i} onClick={()=>setSelected(ds)} style={{background:isSel?'#2A1F14':'#1E1A16',minHeight:88,padding:8,cursor:'pointer',border:isToday?'1px solid rgba(200,150,90,0.4)':'none'}}>
              <div style={{fontSize:11,color:isToday?'#C8965A':'rgba(245,239,230,0.5)',marginBottom:4}}>{d}</div>
              {items.length>0 && (
                <div style={{fontSize:10,color:'rgba(200,150,90,0.75)',lineHeight:1.4}}>
                  {items.slice(0,2).map(r=>(
                    <div key={r.id} style={{whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                      <span style={{color:r.status==='pending'?'#C8965A':r.status==='confirmed'?'#7B9E6E':'rgba(245,239,230,0.5)'}}>●</span> {r.name}
                    </div>
                  ))}
                  {items.length>2 && <div style={{color:'rgba(245,239,230,0.3)'}}>+{items.length-2} 筆</div>}
                  <div style={{fontSize:9,color:'rgba(245,239,230,0.35)',marginTop:2}}>共 {totalPeople} 人</div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {selected && (
        <div className="card">
          <h3 style={{marginBottom:16}}>{selected} 預約</h3>
          {dayRes.length === 0 && <div style={{color:'rgba(245,239,230,0.3)',fontSize:13}}>此日無預約</div>}
          {dayRes.map(r=>(
            <div key={r.id} style={{padding:'14px 0',borderBottom:'1px solid rgba(245,239,230,0.05)',display:'grid',gridTemplateColumns:'1fr auto',gap:12}}>
              <div>
                <div style={{fontSize:14,color:'#F0E8DE',marginBottom:4}}>{r.name} · {r.people} 位 · {r.time}</div>
                <div style={{fontSize:12,color:'rgba(245,239,230,0.5)',marginBottom:4}}>{r.courseName} · {r.email}</div>
                {r.note && <div style={{fontSize:12,color:'rgba(245,239,230,0.35)',fontStyle:'italic'}}>備註：{r.note}</div>}
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:6,alignItems:'flex-end'}}>
                <select value={r.status} onChange={e=>updateStatus(r,e.target.value)} style={{fontSize:11,padding:'5px 8px',minWidth:110}}>
                  {PP.RESERVATION_STATUSES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
                </select>
                <button className="btn btn-danger" style={{padding:'4px 10px',fontSize:11}} onClick={()=>deleteRes(r.id)}>刪除</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Audit View (works approval) ──────────────────────────────────────────
function AuditView() {
  const [works, setWorks] = useState(PP.getWorks());
  const [filter, setFilter] = useState('all');
  const settings = PP.getSettings();
  const refresh = () => setWorks(PP.getWorks());
  const update = (w, patch) => { PP.saveWork({...w, ...patch}); refresh(); };

  let list = works;
  if (filter === 'willing')   list = works.filter(w => w.willingToSell && !w.published);
  if (filter === 'published') list = works.filter(w => w.published);

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
        <h2>作品審核 · 商品上架</h2>
        <div style={{display:'flex',gap:4}}>
          {[['all','全部'],['willing','待審核'],['published','已上架']].map(([k,l])=>(
            <button key={k} className={`btn ${filter===k?'btn-primary':''}`} style={{padding:'6px 14px',fontSize:12}} onClick={()=>setFilter(k)}>{l}</button>
          ))}
        </div>
      </div>

      {list.length===0 && <div style={{color:'rgba(245,239,230,0.3)',textAlign:'center',padding:60,border:'1px dashed rgba(200,150,90,0.15)'}}>沒有符合的作品</div>}

      {list.map(w=>(
        <div key={w.id} className="card" style={{marginBottom:12}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr auto',gap:16,alignItems:'start',marginBottom:12}}>
            <div>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4}}>
                <span style={{fontSize:16,color:'#F0E8DE',letterSpacing:'.08em'}}>{w.workName}</span>
                {w.published && <span className="tag" style={{borderColor:'rgba(123,158,110,0.3)',color:'#7B9E6E'}}>已上架</span>}
                {w.willingToSell && !w.published && <span className="tag" style={{borderColor:'rgba(200,150,90,0.3)',color:'#C8965A'}}>待審核</span>}
                {!w.willingToSell && <span className="tag" style={{borderColor:'rgba(245,239,230,0.1)',color:'rgba(245,239,230,0.3)'}}>學員未同意販售</span>}
              </div>
              <div style={{fontSize:12,color:'rgba(245,239,230,0.5)'}}>{w.studentName} · {w.courseName} · {w.courseDate}</div>
            </div>
            <a href={`work.html?id=${w.id}`} target="_blank" rel="noreferrer" className="btn" style={{padding:'6px 12px',fontSize:12,textDecoration:'none'}}>檢視作品</a>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'auto auto auto auto 1fr',gap:12,alignItems:'center',padding:12,background:'rgba(200,150,90,0.04)',border:'1px solid rgba(200,150,90,0.1)'}}>
            <label style={{display:'flex',alignItems:'center',gap:6,marginBottom:0,fontSize:12,cursor:'pointer'}}>
              <input type="checkbox" checked={!!w.willingToSell} onChange={e=>update(w,{willingToSell:e.target.checked})} style={{width:'auto'}} />
              <span>同意販售</span>
            </label>
            <div style={{width:1,height:20,background:'rgba(200,150,90,0.15)'}} />
            <span style={{fontSize:11,color:'rgba(200,150,90,0.7)'}}>商品型式</span>
            <select value={w.productType||''} onChange={e=>update(w,{productType:e.target.value})} style={{fontSize:12,padding:'6px 10px',minWidth:130}}>
              <option value="">— 未設定 —</option>
              {(settings.productTypes||[]).map(t=><option key={t} value={t}>{t}</option>)}
            </select>
            <label style={{display:'flex',alignItems:'center',gap:6,marginBottom:0,fontSize:12,cursor:'pointer',justifySelf:'end'}}>
              <input type="checkbox" checked={!!w.published} onChange={e=>update(w,{published:e.target.checked})} disabled={!w.productType} style={{width:'auto'}} />
              <span style={{color:w.productType?'#F0E8DE':'rgba(245,239,230,0.3)'}}>上架到「探索香氣」</span>
            </label>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── Works List ─────────────────────────────────────────────────────────────
function WorksList({ works, courses }) {
  const workUrl = (id) => `${window.location.origin}${window.location.pathname.replace('admin.html','work.html')}?id=${id}`;
  return (
    <div>
      <h2 style={{marginBottom:24}}>作品紀錄</h2>
      {works.length===0 && <div style={{color:'rgba(245,239,230,0.3)',textAlign:'center',padding:60,border:'1px dashed rgba(200,150,90,0.15)'}}>尚無作品記錄</div>}
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
        <thead>
          <tr style={{borderBottom:'1px solid rgba(200,150,90,0.2)'}}>
            {['作品名稱','學員','課程','日期','連結'].map(h=>(
              <th key={h} style={{textAlign:'left',padding:'8px 12px',color:'rgba(200,150,90,0.65)',fontWeight:300,fontSize:11,letterSpacing:'.1em'}}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {works.map(w=>(
            <tr key={w.id} style={{borderBottom:'1px solid rgba(245,239,230,0.05)'}}>
              <td style={{padding:'10px 12px',color:'#F0E8DE'}}>{w.workName}</td>
              <td style={{padding:'10px 12px',color:'rgba(245,239,230,0.65)'}}>{w.studentName}</td>
              <td style={{padding:'10px 12px',color:'rgba(245,239,230,0.4)',fontSize:12}}>{w.courseName}</td>
              <td style={{padding:'10px 12px',color:'rgba(245,239,230,0.4)',fontSize:12}}>{w.courseDate}</td>
              <td style={{padding:'10px 12px'}}>
                <a href={workUrl(w.id)} target="_blank" style={{color:'rgba(200,150,90,0.7)',fontSize:11,fontFamily:'monospace'}}>開啟 →</a>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// ── Settings ───────────────────────────────────────────────────────────────
function SettingsPage({ onSaved }) {
  const [s, setS] = useState(PP.getSettings());
  const [newType, setNewType] = useState('');
  const [msg, setMsg] = useState('');

  const save = () => { PP.saveSettings(s); setMsg('已儲存'); setTimeout(()=>setMsg(''),2500); };
  const addType = () => { if(!newType.trim()) return; setS(p=>({...p,courseTypes:[...p.courseTypes,newType.trim()]})); setNewType(''); };
  const removeType = (t) => setS(p=>({...p,courseTypes:p.courseTypes.filter(x=>x!==t)}));

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:28}}>
        <h2>系統設定</h2>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {msg && <span style={{color:'rgba(123,158,110,0.9)',fontSize:12}}>{msg}</span>}
          <button className="btn btn-primary" onClick={save}>儲存設定</button>
        </div>
      </div>

      <div className="card" style={{marginBottom:16}}>
        <h3>帳號安全</h3>
        <div className="field" style={{marginBottom:0}}>
          <label>管理員密碼</label>
          <input type="password" value={s.adminPassword} onChange={e=>setS(p=>({...p,adminPassword:e.target.value}))} />
        </div>
      </div>

      <div className="card" style={{marginBottom:16}}>
        <h3>課程類型管理</h3>
        <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12}}>
          {s.courseTypes.map(t=>(
            <span key={t} style={{background:'rgba(200,150,90,0.1)',border:'1px solid rgba(200,150,90,0.25)',padding:'4px 10px',fontSize:12,display:'flex',alignItems:'center',gap:6}}>
              {t}
              <button onClick={()=>removeType(t)} style={{background:'none',border:'none',color:'rgba(200,80,60,0.6)',fontSize:13,lineHeight:1,padding:0}}>×</button>
            </span>
          ))}
        </div>
        <div style={{display:'flex',gap:6}}>
          <input value={newType} onChange={e=>setNewType(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addType()} placeholder="新課程類型名稱" style={{maxWidth:260}} />
          <button className="btn" onClick={addType}>新增</button>
        </div>
      </div>

      <div className="card" style={{marginBottom:16}}>
        <h3>Google Sheet 同步</h3>
        <div className="field" style={{marginBottom:0}}>
          <label>Apps Script Web App URL</label>
          <input value={s.googleScriptUrl} onChange={e=>setS(p=>({...p,googleScriptUrl:e.target.value}))} placeholder="https://script.google.com/macros/s/..." />
        </div>
        <div style={{marginTop:10,fontSize:12,color:'rgba(245,239,230,0.3)',lineHeight:1.8}}>
          需先在 Google Apps Script 建立 Web App，設定為「任何人均可存取」。<br/>
          學員提交作品後系統將自動 POST 資料到此 URL。
        </div>
      </div>

      <div className="card">
        <h3>AI 預設指令</h3>
        <div className="field">
          <label>命名預設指令</label>
          <textarea rows={4} value={s.defaultAiNamePrompt} onChange={e=>setS(p=>({...p,defaultAiNamePrompt:e.target.value}))} />
        </div>
        <div className="field" style={{marginBottom:0}}>
          <label>介紹預設指令</label>
          <textarea rows={4} value={s.defaultAiDescPrompt} onChange={e=>setS(p=>({...p,defaultAiDescPrompt:e.target.value}))} />
        </div>
      </div>
    </div>
  );
}

// ── Shell ──────────────────────────────────────────────────────────────────
function Admin() {
  const [authed, setAuthed] = useState(() => sessionStorage.getItem('pp_admin_auth') === '1');
  const [view, setView] = useState('courses'); // courses | editor | works | settings
  const [courses, setCourses] = useState([]);
  const [works, setWorks] = useState([]);
  const [editing, setEditing] = useState(null);

  useEffect(() => {
    setCourses(PP.getCourses());
    setWorks(PP.getWorks());
  }, []);

  const refresh = () => { setCourses(PP.getCourses()); setWorks(PP.getWorks()); };

  const handleSave = (c) => {
    PP.saveCourse(c);
    refresh();
    setView('courses');
  };
  const handleCopy = (c) => {
    const copy = { ...c, id: PP.genId(), token: PP.genToken(), name: c.name + '（複製）', createdAt: new Date().toISOString() };
    PP.saveCourse(copy);
    refresh();
  };
  const handleDelete = (id) => {
    if (!confirm('確定要刪除此課程？相關作品不會被刪除。')) return;
    PP.deleteCourse(id);
    refresh();
  };

  if (!authed) return <Login onLogin={()=>setAuthed(true)} />;

  const navItems = [
    { key: 'courses',      label: '課程管理' },
    { key: 'reservations', label: '預約管理' },
    { key: 'audit',        label: '作品審核' },
    { key: 'works',        label: '作品紀錄' },
    { key: 'settings',     label: '系統設定' },
  ];

  const settings = PP.getSettings();

  return (
    <div style={{display:'flex',minHeight:'100vh'}}>
      {/* Sidebar */}
      <div style={{width:200,background:'#100E0C',borderRight:'1px solid rgba(200,150,90,0.12)',padding:'28px 0',flexShrink:0}}>
        <div style={{padding:'0 20px',marginBottom:32}}>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:12,fontStyle:'italic',letterSpacing:'.25em',color:'rgba(200,150,90,0.6)'}}>Phinn-Phang</div>
          <div style={{fontSize:13,color:'rgba(245,239,230,0.5)',letterSpacing:'.1em',marginTop:2}}>後台管理</div>
        </div>
        {navItems.map(n=>(
          <button key={n.key} onClick={()=>{ setView(n.key); setEditing(null); }}
            style={{display:'block',width:'100%',textAlign:'left',background:view===n.key?'rgba(200,150,90,0.1)':'transparent',border:'none',borderLeft:`2px solid ${view===n.key?'#C8965A':'transparent'}`,padding:'10px 20px',color:view===n.key?'#C8965A':'rgba(245,239,230,0.5)',fontSize:13,letterSpacing:'.08em',transition:'.2s'}}>
            {n.label}
          </button>
        ))}
        <div style={{position:'absolute',bottom:24,padding:'0 20px',width:'100%'}}>
          <a href="index.html" style={{display:'block',textAlign:'center',fontFamily:"'Noto Serif TC',serif",fontSize:12,letterSpacing:'.1em',color:'rgba(245,239,230,0.25)',textDecoration:'none'}}>← 回首頁</a>
        </div>
      </div>

      {/* Main */}
      <div style={{flex:1,padding:'36px 40px 36px',overflowY:'auto',position:'relative'}}>
        <button className="btn btn-danger" style={{position:'absolute',top:12,right:16,fontSize:11,padding:'4px 12px',zIndex:5,opacity:.7}} onClick={()=>{sessionStorage.removeItem('pp_admin_auth');window.location.href='index.html'}}>登出</button>
        <div style={{paddingTop:24}}>
        {view==='courses' && !editing && (
          <CourseList courses={courses} works={works}
            onCreate={()=>{setEditing(null);setView('editor')}}
            onEdit={c=>{setEditing(c);setView('editor')}}
            onCopy={handleCopy}
            onDelete={handleDelete}
          />
        )}
        {view==='editor' && (
          <CourseEditor
            course={editing}
            settings={settings}
            onSave={handleSave}
            onCancel={()=>{setView('courses');setEditing(null)}}
          />
        )}
        {view==='reservations' && <ReservationsView />}
        {view==='audit' && <AuditView />}
        {view==='works' && <WorksList works={works} courses={courses} />}
        {view==='settings' && <SettingsPage />}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Admin />);
</script>
</body>
</html>
