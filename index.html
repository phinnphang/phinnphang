<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phinn-Phang 聞香</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Noto+Serif+TC:wght@300;400;500;600&family=Lato:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1A1612;
  --bg2: #201610;
  --bg3: #3D2E20;
  --text-main: #F5EFE6;
  --text-sub: rgba(245,239,230,0.65);
  --text-mute: rgba(245,239,230,0.35);
  --text-rgb: 245,239,230;
  --gold: #C8965A;
  --gold2: rgba(200,150,90,0.25);
  --gold3: rgba(200,150,90,0.08);
  --gold-rgb: 200,150,90;
  --coral: #E8B5A0;
  --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  --hero-bg: radial-gradient(ellipse at 50% 65%, #3D2005 0%, #201208 35%, #1A1210 75%);
  --card-bg: #231810;
  --card-hov-bg: #2A1E12;
  --nav-link: rgba(245,239,230,0.6);
}
[data-theme="light"] {
  --bg: #FCF9F5;
  --bg2: #F5EFE6;
  --bg3: #EDE4D7;
  --text-main: #2B2118;
  --text-sub: rgba(26,22,18,0.78);
  --text-mute: rgba(26,22,18,0.58);
  --text-rgb: 38,30,22;
  --gold: #7D5A26;
  --gold2: rgba(125,90,38,0.2);
  --gold3: rgba(125,90,38,0.07);
  --gold-rgb: 125,90,38;
  --coral: #9C5842;
  --hero-bg: radial-gradient(ellipse at 50% 65%, #FBF9F6 0%, #F5EFE6 45%, #E8DFD0 100%);
  --card-bg: #FFFFFF;
  --card-hov-bg: #F9F5EE;
  --nav-link: rgba(26,22,18,0.72);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text-main);
  font-family: 'Lato', 'Noto Serif TC', sans-serif;
  font-weight: 300;
  line-height: 1.75;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  transition: background-color 0.4s ease, color 0.4s ease;
}
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: rgba(200,150,90,0.3); border-radius: 2px; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes smokeRise {
  0%   { transform: translateY(0) scaleX(1);    opacity: 0.18; }
  60%  { opacity: 0.08; }
  100% { transform: translateY(-80px) scaleX(2); opacity: 0; }
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-8px); }
}
button { cursor: pointer; }
</style>
<script src="app-data.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
