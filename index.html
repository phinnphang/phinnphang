<head>
<meta charset="UTF-8">

<title>Phinn-Phang 聞香</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Noto+Serif+TC:wght@300;400;500;600&family=Lato:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1A1612;
  --bg2: #201610;
  --bg3: #3D2E20;
  --text-main: #F5EFE6;
  --text-sub: rgba(245,239,230,0.65);
  --text-mute: rgba(245,239,230,0.35);
  --text-rgb: 245,239,230;
  --gold: #C8965A;
  --gold2: rgba(200,150,90,0.25);
  --gold3: rgba(200,150,90,0.08);
  --gold-rgb: 200,150,90;
  --coral: #E8B5A0;
  --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  --hero-bg: radial-gradient(ellipse at 50% 65%, #3D2005 0%, #201208 35%, #1A1210 75%);
  --card-bg: #231810;
  --card-hov-bg: #2A1E12;
  --nav-link: rgba(245,239,230,0.6);
}
[data-theme="light"] {
  --bg: #FCF9F5;
  --bg2: #F5EFE6;
  --bg3: #EDE4D7;
  --text-main: #2B2118;
  --text-sub: rgba(26,22,18,0.78);
  --text-mute: rgba(26,22,18,0.58);
  --text-rgb: 38,30,22;
  --gold: #7D5A26;
  --gold2: rgba(125,90,38,0.2);
  --gold3: rgba(125,90,38,0.07);
  --gold-rgb: 125,90,38;
  --coral: #9C5842;
  --hero-bg: radial-gradient(ellipse at 50% 65%, #FBF9F6 0%, #F5EFE6 45%, #E8DFD0 100%);
  --card-bg: #FFFFFF;
  --card-hov-bg: #F9F5EE;
  --nav-link: rgba(26,22,18,0.72);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text-main);
  font-family: 'Lato', 'Noto Serif TC', sans-serif;
  font-weight: 300;
  line-height: 1.75;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  transition: background-color 0.4s ease, color 0.4s ease;
}
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: rgba(200,150,90,0.3); border-radius: 2px; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes smokeRise {
  0%   { transform: translateY(0) scaleX(1);    opacity: 0.18; }
  60%  { opacity: 0.08; }
  100% { transform: translateY(-80px) scaleX(2); opacity: 0; }
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-8px); }
}
button { cursor: pointer; }

/* ================================================================
   RWD SYSTEM — Phinn-Phang
   Breakpoints (mobile-first overrides):
     ≤ 480px  : 手機 (iPhone SE 375 起跳)
     ≤ 768px  : 大手機 / 小平板
     ≤ 1024px : 平板
     > 1024px : 桌機 (現況維持)
   ================================================================ */

:root {
  --pad-x: 100px;
  --pad-y: 72px;
  --container-max: 1200px;
  --gap-lg: 40px;
  --gap-md: 28px;
  --gap-sm: 16px;
  --fs-h1: 52px;
  --fs-h2: 38px;
  --fs-h3: 24px;
  --fs-body: 14px;
  --fs-sm: 12px;
  --nav-h: 72px;
  --modal-max-w: 640px;
  --card-pad: 36px;
}

@media (max-width: 1024px) {
  :root {
    --pad-x: 48px;
    --pad-y: 56px;
    --gap-lg: 32px;
    --gap-md: 24px;
    --fs-h1: 44px;
    --fs-h2: 32px;
    --card-pad: 32px;
  }
}

@media (max-width: 768px) {
  :root {
    --pad-x: 24px;
    --pad-y: 44px;
    --gap-lg: 24px;
    --gap-md: 20px;
    --gap-sm: 12px;
    --fs-h1: 32px;
    --fs-h2: 26px;
    --fs-h3: 20px;
    --fs-body: 14px;
    --nav-h: 60px;
    --modal-max-w: calc(100vw - 24px);
    --card-pad: 24px;
  }
}

@media (max-width: 480px) {
  :root {
    --pad-x: 18px;
    --pad-y: 36px;
    --fs-h1: 28px;
    --fs-h2: 22px;
    --fs-h3: 18px;
    --card-pad: 20px;
  }
}

/* RWD UTILITY CLASSES */
.rwd-container {
  padding-left: var(--pad-x);
  padding-right: var(--pad-x);
  max-width: var(--container-max);
  margin-left: auto;
  margin-right: auto;
}

@media (max-width: 768px) {
  .rwd-grid-3 { grid-template-columns: 1fr !important; gap: var(--gap-md) !important; }
  .rwd-grid-4 { grid-template-columns: repeat(2, 1fr) !important; gap: var(--gap-md) !important; }
  .rwd-grid-auto { grid-template-columns: 1fr !important; }
  .rwd-info-grid {
    grid-template-columns: 1fr !important;
    gap: var(--gap-md) !important;
    text-align: left !important;
  }
  .rwd-info-grid > *:last-child {
    text-align: left !important;
    min-width: 0 !important;
  }
  .rwd-formula-row {
    grid-template-columns: 1fr auto !important;
    gap: 8px 12px !important;
  }
  .rwd-formula-row > :last-child {
    grid-column: 1 / -1 !important;
  }
  .rwd-stack {
    flex-direction: column !important;
    align-items: flex-start !important;
  }
  .rwd-stack-center {
    flex-direction: column !important;
    align-items: center !important;
    text-align: center !important;
  }
  .rwd-hide-mobile { display: none !important; }
}

@media (min-width: 769px) {
  .rwd-show-mobile { display: none !important; }
}

@media (max-width: 480px) {
  .rwd-modal-body {
    max-width: calc(100vw - 24px) !important;
    width: calc(100vw - 24px) !important;
    padding: 28px 20px !important;
    max-height: calc(100vh - 32px) !important;
    overflow-y: auto;
  }
  .rwd-google-btn-wrap {
    width: 100% !important;
    display: flex;
    justify-content: center;
  }
  .rwd-google-btn-wrap > div,
  .rwd-google-btn-wrap iframe {
    width: 100% !important;
    max-width: 100% !important;
  }
}

@media (max-width: 768px) {
  .rwd-hero { height: 48vh !important; min-height: 320px !important; }
  .rwd-radar-note {
    flex-direction: column !important;
    gap: var(--gap-md) !important;
  }
  .rwd-radar-note > * {
    width: 100% !important;
    max-width: 100% !important;
  }
}

/* HAMBURGER MENU */
.nav-desktop { display: flex; }
.nav-hamburger { display: none; }

@media (max-width: 768px) {
  .nav-desktop { display: none !important; }
  .nav-hamburger { display: flex !important; }
}

.hamburger-btn {
  width: 40px;
  height: 40px;
  position: relative;
  background: none;
  border: 1px solid var(--gold2);
  border-radius: 0;
  cursor: pointer;
  transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}
.hamburger-btn:hover { border-color: var(--gold); }
.hamburger-btn .line {
  position: absolute;
  left: 50%;
  width: 18px;
  height: 1px;
  background: var(--gold);
  transform-origin: center;
  transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}
.hamburger-btn .line-1 { top: 14px; transform: translateX(-50%); }
.hamburger-btn .line-2 { top: 20px; transform: translateX(-50%); width: 12px; }
.hamburger-btn .line-3 { top: 26px; transform: translateX(-50%); }
.hamburger-btn.open .line-1 {
  top: 20px;
  transform: translateX(-50%) rotate(45deg);
  width: 18px;
}
.hamburger-btn.open .line-2 {
  opacity: 0;
  transform: translateX(-50%) scaleX(0);
}
.hamburger-btn.open .line-3 {
  top: 20px;
  transform: translateX(-50%) rotate(-45deg);
}

.mobile-menu-overlay {
  position: fixed;
  inset: 0;
  z-index: 190;
  background: var(--bg);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 24px 40px;
}
.mobile-menu-overlay.open {
  opacity: 1;
  pointer-events: auto;
}

.mobile-menu-overlay::before,
.mobile-menu-overlay::after {
  content: '';
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  width: 40px;
  height: 1px;
  background: var(--gold);
  opacity: 0;
  transition: opacity 0.6s ease 0.2s, width 0.6s ease 0.2s;
}
.mobile-menu-overlay::before { top: 100px; }
.mobile-menu-overlay::after { bottom: 60px; }
.mobile-menu-overlay.open::before,
.mobile-menu-overlay.open::after {
  opacity: 0.5;
  width: 60px;
}

.mobile-menu-item {
  font-family: 'Noto Serif TC', serif;
  font-size: 22px;
  font-weight: 300;
  letter-spacing: 0.2em;
  color: var(--text-main);
  background: none;
  border: none;
  padding: 14px 0;
  cursor: pointer;
  position: relative;
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.5s ease, transform 0.5s ease, color 0.3s ease;
}
.mobile-menu-item .en {
  display: block;
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px;
  font-style: italic;
  letter-spacing: 0.3em;
  color: rgba(var(--gold-rgb), 0.5);
  margin-top: 4px;
  text-transform: uppercase;
}
.mobile-menu-item:hover,
.mobile-menu-item:active { color: var(--gold); }

.mobile-menu-overlay.open .mobile-menu-item {
  opacity: 1;
  transform: translateY(0);
}
.mobile-menu-overlay.open .mobile-menu-item:nth-child(1) { transition-delay: 0.15s; }
.mobile-menu-overlay.open .mobile-menu-item:nth-child(2) { transition-delay: 0.22s; }
.mobile-menu-overlay.open .mobile-menu-item:nth-child(3) { transition-delay: 0.29s; }
.mobile-menu-overlay.open .mobile-menu-item:nth-child(4) { transition-delay: 0.36s; }
.mobile-menu-overlay.open .mobile-menu-item:nth-child(5) { transition-delay: 0.43s; }
.mobile-menu-overlay.open .mobile-menu-item:nth-child(6) { transition-delay: 0.50s; }

body.menu-open { overflow: hidden; }
</style>
